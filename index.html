<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBD love</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0005;
        overflow-x: hidden;
      }
      #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #overlay {
        position: relative;
        z-index: 10;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding: clamp(1rem, 5vw, 2rem);
        padding-bottom: clamp(2rem, 8vw, 4rem);
        pointer-events: none;
      }
      #message {
        background: rgba(10, 0, 5, 0.6);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(240, 98, 146, 0.35);
        border-radius: 20px;
        padding: clamp(1.25rem, 5vw, 2rem) clamp(1.5rem, 6vw, 2.5rem);
        max-width: min(520px, 100%);
        width: 100%;
        text-align: center;
        opacity: 0;
        transform: translateY(24px);
        transition:
          opacity 0.9s ease,
          transform 0.9s ease;
      }
      #message.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .line {
        font-family: "Georgia", "Times New Roman", serif;
        color: #fff8f8;
        line-height: 1.65;
        min-height: 1.65em;
        font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      }
      .line + .line {
        margin-top: 0.3rem;
      }
      .line.big {
        font-size: clamp(1.15rem, 5.5vw, 1.65rem);
        font-weight: bold;
        color: #f9c74f;
        margin-bottom: 0.4rem;
      }
      .line.heart {
        color: #f48fb1;
      }

      #clock-box {
        margin-top: clamp(0.8rem, 3vw, 1.2rem);
        font-family: "Courier New", monospace;
        font-size: clamp(0.68rem, 2.6vw, 0.88rem);
        color: rgba(240, 98, 146, 0.7);
        letter-spacing: 0.04em;
      }

      #hint {
        position: fixed;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        font-family: "Georgia", serif;
        font-size: clamp(0.7rem, 3vw, 0.85rem);
        color: rgba(255, 255, 255, 0.45);
        pointer-events: none;
        animation: pulse 2.2s ease-in-out infinite;
        white-space: nowrap;
      }
      #hint.hidden {
        display: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 0.9;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #hint {
          animation: none;
          opacity: 0.6;
        }
        #message {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="overlay">
      <div id="message">
        <div class="line big" id="l0"></div>
        <div class="line" id="l1"></div>
        <div class="line" id="l2"></div>
        <div class="line" id="l3"></div>
        <div class="line heart" id="l4"></div>
        <div class="line" id="l5"></div>
        <div id="clock-box"><span id="clock">…</span></div>
      </div>
    </div>

    <div id="hint">✨ tap anywhere to begin ✨</div>

    <audio id="myAudio" preload="none">
      <source src="aud.mp3" type="audio/mpeg" />
    </audio>

    <script>
      /* ── CONFIG ──────────────────────────────── */
      const LINES = [
        { id: "l0", text: "Happy Birthday 🎈" },
        { id: "l1", text: "May Allah bless you 🍀" },
        { id: "l2", text: "And give u many happiness 💕" },
        { id: "l3", text: "absolute favourite person" },
        {
          id: "l4",
          text: "I hope your day is filled with endless love and laughter",
        },
        { id: "l5", text: "Hope u have a great day today ❤️" },
      ];
      const START_DATE = new Date("2024-02-13T00:00:00");

      /* ── CANVAS ──────────────────────────────── */
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      /* tree branches (pre-computed) */
      const branches = [];
      function buildTree() {
        branches.length = 0;
        function rec(x1, y1, angle, len, depth) {
          if (depth === 0 || len < 1.5) return;
          const x2 = x1 + Math.cos(angle) * len,
            y2 = y1 + Math.sin(angle) * len;
          branches.push({ x1, y1, x2, y2, depth });
          const sp = 0.36;
          rec(x2, y2, angle - sp, len * 0.68, depth - 1);
          rec(x2, y2, angle + sp, len * 0.68, depth - 1);
          if (depth > 3) rec(x2, y2, angle, len * 0.78, depth - 1);
        }
        rec(W / 2, H, -Math.PI / 2, Math.min(H * 0.27, 130), 9);
      }

      /* particles */
      const particles = [];
      function addParticle(x, y, type) {
        const hue =
          type === "blossom"
            ? 330 + Math.random() * 40
            : 320 + Math.random() * 40;
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * (type === "heart" ? 0.8 : 1.4),
          vy: -(Math.random() * 1.8 + (type === "heart" ? 0.8 : 0.3)),
          r:
            type === "blossom"
              ? Math.random() * 3 + 1.5
              : Math.random() * 0.8 + 0.3,
          life: 1,
          decay: Math.random() * 0.003 + 0.0015,
          hue,
          type,
        });
      }

      function heartPath(cx, cy, s) {
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2; t += 0.05) {
          const x = cx + (s * 16 * Math.pow(Math.sin(t), 3)) / 16;
          const y =
            cy -
            (s *
              (13 * Math.cos(t) -
                5 * Math.cos(2 * t) -
                2 * Math.cos(3 * t) -
                Math.cos(4 * t))) /
              16;
          t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
      }

      let treeIdx = 0,
        frame = 0,
        started = false;

      function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, W, H);

        /* bg */
        const bg = ctx.createRadialGradient(
          W / 2,
          H * 0.38,
          0,
          W / 2,
          H * 0.38,
          H * 0.85,
        );
        bg.addColorStop(0, "#1c0012");
        bg.addColorStop(1, "#040002");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        if (!started) return;

        /* grow tree */
        if (treeIdx < branches.length) {
          treeIdx = Math.min(treeIdx + 5, branches.length);
        }
        for (let i = 0; i < treeIdx; i++) {
          const b = branches[i];
          ctx.beginPath();
          ctx.moveTo(b.x1, b.y1);
          ctx.lineTo(b.x2, b.y2);
          ctx.lineWidth = Math.max(0.5, b.depth * 0.55);
          ctx.strokeStyle = b.depth > 3 ? "#5a2a10" : "#8b4513";
          ctx.stroke();
          if (b.depth <= 2 && i === treeIdx - 1) {
            addParticle(b.x2, b.y2, "blossom");
          }
          if (b.depth <= 2) {
            ctx.beginPath();
            ctx.arc(b.x2, b.y2, 2 + Math.random() * 2, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${340 + Math.random() * 30},78%,72%,0.8)`;
            ctx.fill();
          }
        }

        /* particles */
        if (
          frame % 70 === 0 &&
          particles.filter((p) => p.type === "heart").length < 20
        ) {
          addParticle(W * (0.2 + Math.random() * 0.6), H + 10, "heart");
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx + Math.sin(frame * 0.018 + i) * 0.28;
          p.y += p.vy;
          p.vy += 0.012;
          p.life -= p.decay;
          if (p.life <= 0 || p.y < -50) {
            particles.splice(i, 1);
            continue;
          }
          ctx.save();
          ctx.globalAlpha = p.life * 0.85;
          ctx.fillStyle = `hsl(${p.hue},80%,72%)`;
          if (p.type === "heart") {
            heartPath(p.x, p.y, p.r * 9);
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        frame++;
      }
      loop();

      /* ── TYPEWRITER ───────────────────────────── */
      function typewrite(el, text, spd = 42) {
        return new Promise((res) => {
          el.textContent = "";
          const chars = [...text]; // unicode-safe split
          let i = 0;
          const t = setInterval(() => {
            el.textContent += chars[i++];
            if (i >= chars.length) {
              clearInterval(t);
              res();
            }
          }, spd);
        });
      }

      async function runLines() {
        for (const { id, text } of LINES) {
          await new Promise((r) => setTimeout(r, 820));
          await typewrite(document.getElementById(id), text);
        }
      }

      /* ── CLOCK ────────────────────────────────── */
      function tick() {
        const d = Math.abs(new Date() - START_DATE);
        const days = Math.floor(d / 86400000);
        const hrs = Math.floor((d % 86400000) / 3600000);
        const mins = Math.floor((d % 3600000) / 60000);
        const secs = Math.floor((d % 60000) / 1000);
        document.getElementById("clock").textContent =
          `${days}d ${hrs}h ${mins}m ${secs}s`;
      }
      setInterval(tick, 1000);
      tick();

      /* ── START ────────────────────────────────── */
      function start() {
        if (started) return;
        started = true;
        document.getElementById("hint").classList.add("hidden");
        buildTree();
        setTimeout(() => {
          document.getElementById("message").classList.add("visible");
          runLines();
        }, 1100);
        setInterval(() => {
          if (particles.filter((p) => p.type === "blossom").length < 100) {
            addParticle(
              W / 2 + (Math.random() - 0.5) * W * 0.5,
              H * (0.1 + Math.random() * 0.6),
              "blossom",
            );
          }
        }, 90);
        try {
          document.getElementById("myAudio").play();
        } catch (e) {}
      }

      function burstHearts(x, y) {
        if (!started) return;
        for (let i = 0; i < 6; i++)
          particles.push({
            x: x + (Math.random() - 0.5) * 30,
            y,
            vx: (Math.random() - 0.5) * 0.9,
            vy: -(Math.random() * 2 + 1),
            r: 0.5 + Math.random() * 0.7,
            life: 1,
            decay: 0.007,
            hue: 320 + Math.random() * 40,
            type: "heart",
          });
      }

      document.addEventListener(
        "click",
        (e) => {
          start();
          burstHearts(e.clientX, e.clientY);
        },
        { passive: true },
      );
      document.addEventListener(
        "touchstart",
        (e) => {
          start();
          const t = e.touches[0];
          burstHearts(t.clientX, t.clientY);
        },
        { passive: true },
      );
    </script>
  </body>
</html>
